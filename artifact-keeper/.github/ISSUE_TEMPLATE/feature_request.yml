name: Feature Request
description: Suggest a new feature or enhancement for Artifact Keeper
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide as much detail as possible to help us understand your use case.

        **Filing in the right place:** This repo covers the backend API and server. For web UI features, please file in [artifact-keeper-web](https://github.com/artifact-keeper/artifact-keeper-web/issues/new). If you're unsure, file here and we'll move it if needed.
  
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is your feature request related to a problem?
      placeholder: I'm frustrated when... / It would be helpful if...
    validations:
      required: true
  
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see
      placeholder: A clear and concise description of what you want to happen
    validations:
      required: true
  
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: Describe alternatives you've considered
    validations:
      required: false
  
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe your specific use case or user story
      placeholder: |
        As a [type of user], I want [some goal] so that [some reason].
        
        Example:
        As a DevOps engineer, I want to automatically expire old snapshot versions so that storage costs remain manageable.
    validations:
      required: false
  
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component does this feature relate to?
      options:
        - Backend / API
        - Web UI
        - CLI
        - Docker / Deployment
        - Documentation
        - WASM Plugin System
        - Security Scanning
        - Replication / Mesh Network
        - Authentication / Authorization
        - Other
    validations:
      required: false
  
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or examples about the feature request
      placeholder: |
        - Links to similar features in other tools
        - Mockups or diagrams
        - References to relevant documentation
        - Any other relevant information
    validations:
      required: false
  
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      description: Please verify these items before submitting
      options:
        - label: I have searched existing issues and feature requests to ensure this isn't a duplicate
          required: true
        - label: I have reviewed the documentation to confirm this feature doesn't already exist
          required: true
