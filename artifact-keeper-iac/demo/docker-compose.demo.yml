# Demo deployment for demo.artifactkeeper.com
# Uses pre-built images from ghcr.io (pushed by CI on every main branch commit).
#
# Container images are available from two registries:
#   ghcr.io (default):  ghcr.io/artifact-keeper/artifact-keeper-{backend,web,openscap}
#   Docker Hub:         artifactkeeper/{backend,web,openscap}
#
# To use Docker Hub instead, replace image references below. For example:
#   ghcr.io/artifact-keeper/artifact-keeper-backend:latest  ->  artifactkeeper/backend:latest
# All write operations are blocked via DEMO_MODE.
# Reset daily with: ./reset-demo.sh
#
# Version pinning: create a .env file next to this compose file with:
#   ARTIFACT_KEEPER_VERSION=1.1.0-rc.2
# Note: Docker tags use semver WITHOUT the 'v' prefix (git tag v1.1.0-rc.2 → Docker tag 1.1.0-rc.2).
# If ARTIFACT_KEEPER_VERSION is unset, defaults to 'latest' (latest stable release).

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: artifact_registry
      POSTGRES_USER: registry
      POSTGRES_PASSWORD: registry-demo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registry -d artifact_registry"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/artifact-keeper/artifact-keeper-backend:${ARTIFACT_KEEPER_VERSION:-latest}
    user: "0:0"
    environment:
      DATABASE_URL: postgres://registry:registry-demo@postgres:5432/artifact_registry
      BIND_ADDRESS: 0.0.0.0:8080
      STORAGE_BACKEND: filesystem
      STORAGE_PATH: /data/storage
      JWT_SECRET: demo-instance-jwt-secret-not-for-production
      DEMO_MODE: "true"
      TRIVY_URL: http://trivy:8090
      OPENSCAP_URL: http://openscap:8091
      SCAN_WORKSPACE_PATH: /scan-workspace
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    volumes:
      - artifact_data:/data
      - scan_workspace:/scan-workspace
    depends_on:
      postgres:
        condition: service_healthy

  trivy:
    image: aquasec/trivy:latest
    command: ["server", "--listen", "0.0.0.0:8090"]
    volumes:
      - trivy_cache:/root/.cache/trivy
      - scan_workspace:/scan-workspace:ro

  openscap:
    image: ghcr.io/artifact-keeper/artifact-keeper-openscap:${ARTIFACT_KEEPER_VERSION:-latest}
    volumes:
      - scan_workspace:/scan-workspace:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8091/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: ghcr.io/artifact-keeper/artifact-keeper-web:${ARTIFACT_KEEPER_VERSION:-latest}
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # Seed container — runs once then exits
  seed:
    image: postgres:15-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./seed-demo-data.sql:/seed.sql:ro
    entrypoint: >
      sh -c "
        sleep 5 &&
        PGPASSWORD=registry-demo psql -h postgres -U registry -d artifact_registry -f /seed.sql &&
        echo 'Demo data seeded successfully'
      "

volumes:
  postgres_data:
  artifact_data:
  trivy_cache:
  scan_workspace:
