{{/*
=============================================================================
EXAMPLE CONFIGURATION - Getting Started Template
=============================================================================
This file is provided as a starting point for deployments. It should be
reviewed and modified to match your specific infrastructure requirements,
security policies, and operational needs before use in production.
=============================================================================
*/}}
{{- if .Values.meilisearch.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "artifact-keeper.fullname" . }}-meilisearch
  labels:
    {{- include "artifact-keeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "artifact-keeper.meilisearch.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "artifact-keeper.meilisearch.selectorLabels" . | nindent 8 }}
    spec:
      {{- with (.Values.meilisearch.tolerations | default .Values.global.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.meilisearch.affinity | default .Values.global.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.meilisearch.nodeSelector | default .Values.global.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.meilisearch.topologySpreadConstraints | default .Values.global.topologySpreadConstraints) }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: fix-ownership
          image: busybox:1.37
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - FOWNER
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
              ephemeral-storage: 64Mi
          command: ["sh", "-c", "chown -R 1000:1000 /meili_data"]
          volumeMounts:
            - name: meilisearch-data
              mountPath: /meili_data
        - name: version-guard
          image: busybox:1.37
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
              ephemeral-storage: 64Mi
          command: ["sh", "-c"]
          args:
            - |
              EXPECTED="{{ .Values.meilisearch.image.tag }}"
              VERSION_FILE="/meili_data/data.ms/VERSION"
              if [ ! -f "$VERSION_FILE" ]; then
                echo "No existing database, fresh start"
                exit 0
              fi
              CURRENT=$(cat "$VERSION_FILE" 2>/dev/null || echo "unknown")
              echo "Current DB version: $CURRENT, expected image: $EXPECTED"
              if echo "$CURRENT" | grep -qv "$(echo $EXPECTED | sed 's/^v//')"; then
                echo "Version mismatch — wiping data.ms for clean re-index"
                rm -rf /meili_data/data.ms
                echo "Done. Backend will re-index automatically."
              else
                echo "Versions match, keeping existing data"
              fi
          volumeMounts:
            - name: meilisearch-data
              mountPath: /meili_data
      containers:
        - name: meilisearch
          image: "{{ .Values.meilisearch.image.repository }}:{{ .Values.meilisearch.image.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 7700
              protocol: TCP
          env:
            - name: MEILI_MASTER_KEY
              value: {{ .Values.meilisearch.masterKey | quote }}
            - name: MEILI_ENV
              value: {{ .Values.meilisearch.env | quote }}
            - name: MEILI_MAX_INDEXING_THREADS
              value: "4"
          resources:
            {{- toYaml .Values.meilisearch.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 7700
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 7700
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: meilisearch-data
              mountPath: /meili_data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: meilisearch-data
          persistentVolumeClaim:
            claimName: {{ include "artifact-keeper.fullname" . }}-meilisearch
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "artifact-keeper.fullname" . }}-meilisearch
  labels:
    {{- include "artifact-keeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.meilisearch.persistence.size }}
  {{- if .Values.meilisearch.persistence.storageClass }}
  storageClassName: {{ .Values.meilisearch.persistence.storageClass | quote }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "artifact-keeper.fullname" . }}-meilisearch
  labels:
    {{- include "artifact-keeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 7700
      targetPort: http
      protocol: TCP
  selector:
    {{- include "artifact-keeper.meilisearch.selectorLabels" . | nindent 4 }}
{{- end }}
