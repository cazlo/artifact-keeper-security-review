# =============================================================================
# EXAMPLE CONFIGURATION - Getting Started Template
# =============================================================================
# This file is provided as a starting point for deployments. It should be
# reviewed and modified to match your specific infrastructure requirements,
# security policies, and operational needs before use in production.
# =============================================================================

# Production environment overlay

backend:
  replicaCount: 3
  image:
    tag: latest
  env:
    RUST_LOG: "info"
    ENVIRONMENT: "production"
    ADMIN_PASSWORD: ""
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "4"
      memory: 4Gi
  persistence:
    size: 100Gi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilization: 60
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""  # Set to IRSA role ARN
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: backend
            topologyKey: kubernetes.io/hostname

web:
  replicaCount: 3
  image:
    tag: latest
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: web
            topologyKey: kubernetes.io/hostname

edge:
  enabled: true
  replicaCount: 2
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# Disable in-cluster postgres — use RDS
postgres:
  enabled: false

externalDatabase:
  host: ""  # Set to RDS endpoint
  port: 5432
  username: artifact_keeper
  password: ""
  database: artifact_registry
  existingSecret: artifact-keeper-rds
  existingSecretKey: DATABASE_URL

meilisearch:
  masterKey: ""
  env: "production"
  persistence:
    size: 20Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

trivy:
  persistence:
    size: 20Gi
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 4Gi

dependencyTrack:
  adminPassword: ""
  persistence:
    size: 20Gi
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 8Gi

ingress:
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1024m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  host: ""  # Set to production domain
  tls:
    enabled: true

secrets:
  jwtSecret: ""
  s3AccessKey: ""
  s3SecretKey: ""

# External Secrets Operator pulls secrets from AWS Secrets Manager.
# The RDS module already stores the DB password in Secrets Manager,
# so this extends that pattern to all application secrets.
externalSecrets:
  enabled: true
  storeName: aws-secrets-manager
  storeKind: ClusterSecretStore
  refreshInterval: 1h
  secrets:
    jwtSecret: artifact-keeper/production/jwt-secret
    dbCredentials: artifact-keeper/production/db-credentials
    s3Keys: artifact-keeper/production/s3-keys
    meilisearchKey: artifact-keeper/production/meilisearch-key
    dtAdminPassword: artifact-keeper/production/dt-admin-password

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
  interval: 15s
