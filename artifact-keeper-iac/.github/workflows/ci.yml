name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Helm CI moved to .github/workflows/helm-ci.yml

  terraform-validate:
    name: Terraform Validate (${{ matrix.env }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        env: [dev, staging, production]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0

      - name: Terraform init
        run: terraform init -backend=false
        working-directory: terraform/environments/${{ matrix.env }}

      - name: Terraform validate
        run: terraform validate
        working-directory: terraform/environments/${{ matrix.env }}

  terraform-fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0

      - name: Check formatting
        run: terraform fmt -check -recursive terraform/

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    # SonarCloud Automatic Analysis may be enabled at the org level.
    # Until it is disabled in the SonarCloud UI (Administration > Analysis Method),
    # CI-based analysis will conflict and fail. Allow this job to fail gracefully
    # so it does not block the rest of the pipeline.
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
