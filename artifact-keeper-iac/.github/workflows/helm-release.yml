name: Helm Release

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
      - ".github/workflows/helm-release.yml"

jobs:
  version-check:
    name: Check Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Compare chart version to latest tag
        id: check
        run: |
          version=$(grep '^version:' charts/artifact-keeper/Chart.yaml | awk '{print $2}')
          tag="artifact-keeper-${version}"
          if git tag -l "$tag" | grep -q "$tag"; then
            echo "Tag $tag already exists, skipping release"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "No tag $tag found, will release version $version"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  setup-pages:
    name: Setup GitHub Pages
    needs: version-check
    if: needs.version-check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Create gh-pages branch if missing
        run: |
          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            echo "gh-pages branch already exists"
            exit 0
          fi

          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git checkout --orphan gh-pages
          git rm -rf .

          cat > README.md << 'READMEEOF'
          # Artifact Keeper Helm Repository

          ```
          helm repo add artifact-keeper https://artifact-keeper.github.io/artifact-keeper-iac/
          helm repo update
          ```

          See [releases](https://github.com/artifact-keeper/artifact-keeper-iac/releases) for available chart versions.
          READMEEOF

          git add README.md
          git commit -m "Initialize gh-pages branch"
          git push origin gh-pages

  release:
    name: Release Chart
    needs: [version-check, setup-pages]
    if: needs.version-check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          charts_dir: charts
          skip_existing: "true"
          config: .github/cr.yaml
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
