services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: artifact_keeper
      POSTGRES_USER: artifact_keeper
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artifact_keeper -d artifact_keeper"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    restart: always
    environment:
      cluster.name: artifact-keeper
      node.name: opensearch
      discovery.type: single-node
      bootstrap.memory_lock: "false"
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - /data/opensearch:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -q '\"status\":\"\\(green\\|yellow\\)\"'"]
      interval: 10s
      timeout: 5s
      retries: 10

  trivy:
    image: aquasec/trivy:latest
    restart: always
    command: ["server", "--listen", "0.0.0.0:8090"]
    volumes:
      - /data/trivy-cache:/root/.cache/trivy

  backend:
    image: ghcr.io/artifact-keeper/artifact-keeper-backend:${ARTIFACT_KEEPER_VERSION:-latest}
    restart: always
    environment:
      DATABASE_URL: postgresql://artifact_keeper:${DB_PASSWORD}@postgres:5432/artifact_keeper
      BIND_ADDRESS: 0.0.0.0:8080
      STORAGE_BACKEND: filesystem
      STORAGE_PATH: /data/storage
      JWT_SECRET: ${JWT_SECRET}
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_ALLOW_INVALID_CERTS: "true"
      TRIVY_URL: http://trivy:8090
      RUST_LOG: info
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /data/storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  web:
    image: ghcr.io/artifact-keeper/artifact-keeper-web:${ARTIFACT_KEEPER_VERSION:-latest}
    restart: always
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
