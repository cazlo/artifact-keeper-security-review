# ARC v2 Runner Scale Set for heavy jobs (with privileged DinD sidecar)
#
# Purpose
# -------
# Some CI jobs (helm install smoke tests against k3d, full docker-compose
# stacks, Docker image builds with large dep trees) do not fit inside the
# 4 CPU / 8 Gi envelope of ak-ci-runners or ak-e2e-runners. This scale set
# gives those jobs a larger pod to run in without slowing down the rest of
# CI or saturating the regular pools.
#
# Opt jobs in by setting `runs-on: ak-beefy-runners` in the workflow.
#
# DOCKER HUB PULL-THROUGH AND AUTH
# --------------------------------
# Mirrors the ak-ci-runners setup:
#  1. dind sidecar mounts /etc/docker/daemon.json from the
#     `dind-registry-mirror` ConfigMap so pulls route through the
#     in-cluster artifact-keeper registry-cache when possible.
#  2. The runner container mounts the `dockerhub-pull` Secret at
#     ~/.docker/config.json so authenticated docker.io pulls bypass
#     the anonymous rate limit when the cache cannot serve a request.
#
# Deployed via:
#   kubectl apply -f e2e/dind-registry-mirror-configmap.yaml
#   kubectl -n arc-runners create secret docker-registry dockerhub-pull ...
#     (see argocd/dockerhub-pull-secret.example.yaml)
#   helm upgrade --install ak-beefy-runners \
#     --namespace arc-runners \
#     --version 0.13.1 \
#     -f argocd/arc-beefy-runners-values.yaml \
#     oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set
#
# NOTE: pin --version 0.13.1 to match the ARC controller version already
# running on the cluster (arc-systems namespace). Chart 0.14.x renders an
# incompatible AutoscalingRunnerSet CR that the 0.13.x controller silently
# drops.
#
# Requires secret "github-token-secret" in arc-runners namespace with key "github_token"
#
# Shape mirrors ak-ci-runners (known working) with doubled resources:
#   - dind sidecar placed in initContainers with restartPolicy: Always
#     (K8s native sidecar pattern, required for the 0.13 chart)
#   - dockerd explicit args: --storage-driver=vfs (nested containers) and
#     --group=123 (for /var/run/docker.sock ACL to the runner user)
#   - dind-var mounted at /var/run in both runner and sidecar so the runner
#     can talk to the socket
#
# Capacity check
# --------------
# Per-pod: 4 CPU request / 8 CPU limit, 8 Gi request / 16 Gi limit.
# maxRunners: 5 -> peak 20 CPU / 40 Gi requested across this pool, well
# within Rocky's 88 CPU / 164 Gi allocatable even with ak-ci-runners and
# ak-e2e-runners fully saturated.

githubConfigUrl: "https://github.com/artifact-keeper"
githubConfigSecret: "github-token-secret"
runnerScaleSetName: "ak-beefy-runners"

minRunners: 0
maxRunners: 5

template:
  spec:
    imagePullSecrets:
      - name: ghcr-pull-secret
      - name: dockerhub-pull
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command:
          - /bin/bash
          - -c
          - umask 0000 && /home/runner/run.sh
        env:
          - name: DOCKER_HOST
            value: unix:///var/run/docker.sock
          - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
            value: "120"
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-var
            mountPath: /var/run
          - name: dind-externals
            mountPath: /home/runner/externals
          - name: docker-config-dir
            mountPath: /home/runner/.docker
        resources:
          requests:
            cpu: "4"
            memory: "8Gi"
          limits:
            cpu: "8"
            memory: "16Gi"
    initContainers:
      - name: init-dockerhub-creds
        # Copy the dockerhub-pull Secret's dockerconfigjson into a
        # writable emptyDir mounted at /home/runner/.docker. This
        # gives docker pulls authenticated rate limits AND leaves
        # ~/.docker/config.json writable for subsequent `docker login`
        # calls (e.g. `docker login ghcr.io` in workflows). The earlier
        # readOnly: true subPath mount blocked those writes (iac#83).
        image: busybox:1.36.1
        securityContext:
          runAsUser: 0
        command:
          - sh
          - -c
          - |
            mkdir -p /home/runner/.docker
            if [ -f /secret/.dockerconfigjson ]; then
              cp /secret/.dockerconfigjson /home/runner/.docker/config.json
              chown 1001:1001 /home/runner/.docker/config.json
              chmod 600 /home/runner/.docker/config.json
              chown 1001:1001 /home/runner/.docker
            else
              echo "WARN: /secret/.dockerconfigjson not found; dockerhub-pull Secret may not be wired"
            fi
        volumeMounts:
          - name: dockerhub-secret
            mountPath: /secret
            readOnly: true
          - name: docker-config-dir
            mountPath: /home/runner/.docker
      - name: init-dind-externals
        image: ghcr.io/actions/actions-runner:latest
        command:
          - cp
          - -r
          - /home/runner/externals/.
          - /home/runner/tmpDir/
        volumeMounts:
          - name: dind-externals
            mountPath: /home/runner/tmpDir
      - name: dind
        image: docker:27-dind
        args:
          - dockerd
          - --host=unix:///var/run/docker.sock
          - --storage-driver=vfs
          - --group=123
        restartPolicy: Always
        securityContext:
          privileged: true
        startupProbe:
          exec:
            command:
              - docker
              - info
          failureThreshold: 30
          initialDelaySeconds: 3
          periodSeconds: 3
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-var
            mountPath: /var/run
          - name: dind-externals
            mountPath: /home/runner/externals
          - name: dind-config
            mountPath: /etc/docker/daemon.json
            subPath: daemon.json
            readOnly: true
    volumes:
      - name: work
        emptyDir: {}
      - name: dind-var
        emptyDir: {}
      - name: dind-externals
        emptyDir: {}
      - name: dind-config
        configMap:
          name: dind-registry-mirror
          items:
            - key: daemon.json
              path: daemon.json
      - name: dockerhub-secret
        secret:
          secretName: dockerhub-pull
      - name: docker-config-dir
        emptyDir: {}
